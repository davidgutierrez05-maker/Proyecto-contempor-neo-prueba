<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD de Instrumentos - ASIR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        input,
        button {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        button:hover {
            background-color: #45a049;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #3498db;
            color: white;
        }

        .btn-delete {
            background-color: #e74c3c;
            width: auto;
            padding: 5px 10px;
            font-size: 0.8em;
        }

        .btn-delete:hover {
            background-color: #c0392b;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Gestión de Instrumentos (CRUD)</h2>
        <form id="inst-form">
            <input type="text" id="nombre" placeholder="Nombre (ej. Violín)" required>
            <input type="text" id="familia" placeholder="Familia (ej. Cuerda)" required>
            <button type="submit">Guardar en Base de Datos</button>
        </form>

        <table id="tabla-instrumentos">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Familia</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="lista-instrumentos">
            </tbody>
        </table>
    </div>

    <script>
        // CREDENCIALES CORREGIDAS SEGÚN TUS CAPTURAS Y EL JWT ENVIADO
        const SUB_URL = 'https://xidiihjezddpbgiexbph.supabase.co';
        const SUB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhpZGlpaGplemRkcGJnaWV4YnBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDAwMTEsImV4cCI6MjA5MzAxNjAxMX0.xo6L1RhOg5pCh3aU9R1-vyNtzcLhIKzzmaEHRGp6EDA';

        const _supabase = supabase.createClient(SUB_URL, SUB_KEY);

        const form = document.getElementById('inst-form');
        const tabla = document.getElementById('lista-instrumentos');

        // 1. SELECT: Obtener y mostrar instrumentos
        async function obtenerInstrumentos() {
            const { data, error } = await _supabase
                .from('instruments')
                .select('*')
                .order('id', { ascending: false }); // Los más nuevos arriba

            if (error) {
                console.error('Error de lectura:', error.message);
            } else {
                tabla.innerHTML = '';
                data.forEach(ins => {
                    tabla.innerHTML += `
                    <tr>
                        <td>${ins.name}</td>
                        <td>${ins.family}</td>
                        <td>
                            <button class="btn-delete" onclick="eliminarInstrumento(${ins.id})">Eliminar</button>
                        </td>
                    </tr>`;
                });
            }
        }

        // 2. INSERT: Guardar nuevo instrumento
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('nombre').value;
            const family = document.getElementById('familia').value;

            const { error } = await _supabase
                .from('instruments')
                .insert([{ name: name, family: family }]);

            if (error) {
                alert('Error al guardar: ' + error.message);
            } else {
                form.reset();
                obtenerInstrumentos(); // Refrescar lista
            }
        });

        // 3. DELETE: Borrar instrumento por ID
        async function eliminarInstrumento(id) {
            if (confirm('¿Seguro que quieres eliminar este registro?')) {
                const { error } = await _supabase
                    .from('instruments')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert('Error al eliminar: ' + error.message);
                } else {
                    obtenerInstrumentos(); // Refrescar lista
                }
            }
        }

        // Carga inicial al arrancar el sistema
        obtenerInstrumentos();
    </script>

</body>

</html>
