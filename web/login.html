<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login - Contemporánica</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "surface-container-low": "#0d1c2d",
              "surface-container-lowest": "#010f1f",
              "on-surface": "#d4e4fa",
              "salmon": "#E57373",
              "tertiary-container": "#8b96ac"
            },
            "fontFamily": {
              "body-md": ["Outfit"],
              "headline-md": ["Outfit"],
              "headline-lg": ["Outfit"],
              "display-xl": ["Outfit"],
              "label-sm": ["Outfit"]
            }
          }
        }
      }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .glass-panel {
            background: rgba(39, 54, 71, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #E57373;
            box-shadow: 0 0 0 2px rgba(229, 115, 115, 0.2);
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body-md h-screen flex overflow-hidden selection:bg-salmon selection:text-white">

    <!-- Left side: Background Image and Branding -->
    <div class="hidden lg:flex lg:w-1/2 relative flex-col justify-between p-12">
        <div class="absolute inset-0 z-0">
            <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDBYQx78HMAHhAwvsJC_Z3XFkz4Lw4OQgwm0xROivmklKPgG9BtJP6bDek1_N1kfKZCGUiz9j4WBv6au9amiam1f8MFlp8x3KFUbm2u6MyfseWiCyxXckNOQwo8EGzEdPrQPtyB33lC-4GipgG7cP0eFBkAshJR9sIqMf1awCPPLRF0g177UfrGsM8fEICJ3C3oRObvjDBb-P83AnhNX91FzRcnw4mJetxLBlVH3PWMMfZKhK9AhxsESr0l88I6P0XWjl9VkFmlfhk" alt="Contemporary Music Background" class="w-full h-full object-cover opacity-40 mix-blend-overlay">
            <div class="absolute inset-0 bg-gradient-to-t from-[#010f1f] via-transparent to-transparent"></div>
        </div>
        
        <div class="relative z-10">
            <a href="index.html" class="text-3xl font-bold tracking-tighter text-white flex items-center gap-2 hover:text-salmon transition-colors w-fit">
                <span class="material-symbols-outlined text-4xl">graphic_eq</span>
                Contemporánica
            </a>
        </div>
        
        <div class="relative z-10 max-w-lg fade-in" style="animation-delay: 0.2s;">
            <h1 class="text-4xl font-semibold text-white mb-4 leading-tight">Welcome to the future of sound.</h1>
            <p class="text-tertiary-container text-lg">Join our exclusive network of vanguard composers and world-class ensembles.</p>
        </div>
    </div>

    <!-- Right side: Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 relative">
        <!-- Glow effect -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-salmon/10 blur-[120px] rounded-full pointer-events-none"></div>
        
        <div class="glass-panel w-full max-w-md p-10 rounded-3xl relative z-10 fade-in">
            <!-- Tabs -->
            <div class="flex gap-4 mb-8 border-b border-white/10 pb-4">
                <button id="tab-login" class="text-white font-semibold border-b-2 border-salmon pb-1 transition-all" onclick="switchTab('login')">Sign In</button>
                <button id="tab-register" class="text-slate-400 hover:text-white transition-all pb-1 border-b-2 border-transparent" onclick="switchTab('register')">Create Account</button>
            </div>

            <!-- Login Form -->
            <form id="form-login" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-tertiary-container uppercase tracking-wider mb-2">Email Address</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-3 text-slate-400">mail</span>
                        <input type="email" class="w-full input-field rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none placeholder:text-slate-500" placeholder="you@example.com" required>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-semibold text-tertiary-container uppercase tracking-wider">Password</label>
                        <a href="#" class="text-xs text-salmon hover:underline">Forgot?</a>
                    </div>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-3 text-slate-400">lock</span>
                        <input type="password" class="w-full input-field rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none placeholder:text-slate-500" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="button" class="w-full bg-salmon hover:bg-rose-400 text-white font-medium py-3 rounded-xl transition-all duration-300 active:scale-95 flex justify-center items-center gap-2 mt-4">
                    Sign In <span class="material-symbols-outlined text-[20px]">login</span>
                </button>
            </form>

            <!-- Register Form (Hidden by default) -->
            <form id="form-register" class="space-y-5 hidden">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-tertiary-container uppercase tracking-wider mb-2">First Name</label>
                        <input type="text" class="w-full input-field rounded-xl py-3 px-4 text-white focus:outline-none placeholder:text-slate-500" placeholder="John" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-tertiary-container uppercase tracking-wider mb-2">Last Name</label>
                        <input type="text" class="w-full input-field rounded-xl py-3 px-4 text-white focus:outline-none placeholder:text-slate-500" placeholder="Doe" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-tertiary-container uppercase tracking-wider mb-2">Email Address</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-3 text-slate-400">mail</span>
                        <input type="email" class="w-full input-field rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none placeholder:text-slate-500" placeholder="you@example.com" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-tertiary-container uppercase tracking-wider mb-2">Password</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-3 text-slate-400">lock</span>
                        <input type="password" class="w-full input-field rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none placeholder:text-slate-500" placeholder="Create a strong password" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-tertiary-container uppercase tracking-wider mb-2">I am a...</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="input-field rounded-xl p-3 flex items-center gap-3 cursor-pointer hover:bg-white/10 transition-colors">
                            <input type="radio" name="role" value="composer" class="text-salmon focus:ring-salmon bg-transparent border-white/20" checked>
                            <span class="text-sm text-white font-medium">Composer</span>
                        </label>
                        <label class="input-field rounded-xl p-3 flex items-center gap-3 cursor-pointer hover:bg-white/10 transition-colors">
                            <input type="radio" name="role" value="musician" class="text-salmon focus:ring-salmon bg-transparent border-white/20">
                            <span class="text-sm text-white font-medium">Musician</span>
                        </label>
                    </div>
                </div>
                
                <button type="button" class="w-full bg-salmon hover:bg-rose-400 text-white font-medium py-3 rounded-xl transition-all duration-300 active:scale-95 flex justify-center items-center gap-2 mt-4">
                    Create Account <span class="material-symbols-outlined text-[20px]">person_add</span>
                </button>
            </form>
            
            <!-- Return home mobile -->
            <div class="mt-8 text-center lg:hidden">
                <a href="index.html" class="text-slate-400 hover:text-white text-sm flex items-center justify-center gap-1 transition-colors">
                    <span class="material-symbols-outlined text-[16px]">arrow_back</span>
                    Return to home
                </a>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');
            const loginTab = document.getElementById('tab-login');
            const registerTab = document.getElementById('tab-register');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                
                loginTab.classList.add('text-white', 'border-salmon');
                loginTab.classList.remove('text-slate-400', 'border-transparent');
                
                registerTab.classList.add('text-slate-400', 'border-transparent');
                registerTab.classList.remove('text-white', 'border-salmon');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                
                registerTab.classList.add('text-white', 'border-salmon');
                registerTab.classList.remove('text-slate-400', 'border-transparent');
                
                loginTab.classList.add('text-slate-400', 'border-transparent');
                loginTab.classList.remove('text-white', 'border-salmon');
            }
        }
    </script>
</body>
</html>
